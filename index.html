<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Interaktif Kejutan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Elemen Musik Latar -->
    <audio id="lagu-bg" loop>
        <source src="musik.mp3" type="audio/mpeg">
        Browser tidak mendukung pemutar musik.
    </audio>

    <div class="container">
        <!-- Halaman Depan: Isi Nama -->
        <div id="input-section">
            <h2>Selamat Datang! ✨</h2>
            <p>Silakan isi nama kamu terlebih dahulu:</p>
            <input type="text" id="nama-user" placeholder="Isi nama kamu disini...">
            <button onclick="mulaiWebsite()">Masuk</button>
        </div>

        <!-- Halaman Utama: Muncul Setelah Klik Masuk -->
        <div id="main-content" class="hidden">
            <h2 id="sapaan">Halo!</h2>
            <p>Klik gambar di bawah ini untuk melihat kejutan!</p>
            
            <!-- Gambar Pertama yang Bisa Diklik -->
            <div class="image-wrapper" onclick="tampilkanKejutan()">
                <img src="https://placeholder.com" alt="Gambar Klik" id="gambar-utama">
            </div>

            <!-- Bagian Kejutan: Muncul Setelah Gambar Diklik -->
            <div id="kotak-kejutan" class="hidden">
                <p id="teks-kejutan">🎉 Wah, kamu berhasil memunculkan teks kejutan ini! 🎉</p>
                <img src="https://placeholder.com" alt="Gambar Kejutan" id="gambar-kejutan">
            </div>
        </div>
    </div>

    <!-- Menyambungkan ke file JavaScript -->
    <script src="script.js"></script>
</body>
</html>
